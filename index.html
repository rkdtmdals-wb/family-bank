<style>
:root {
  --bg: #FFF8EF;
  --bg-2: #FFE8D6;
  --surface: #FFFFFF;
  --ink: #2B2318;
  --ink-soft: #6B5F50;
  --primary: #F26A4B;       /* 따뜻한 오렌지 */
  --primary-soft: #FFDBCF;
  --accent: #3D7A5B;        /* 저금통 초록 */
  --accent-soft: #D7EFDF;
  --gold: #E4A94C;          /* 동전 금색 */
  --danger: #D14343;
  --shadow: 6px 6px 0 #2B2318;
  --shadow-sm: 3px 3px 0 #2B2318;
  --border: 3px solid #2B2318;
  --border-thin: 2px solid #2B2318;
  --radius: 18px;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'IBM Plex Sans KR', -apple-system, sans-serif;
  background: var(--bg);
  color: var(--ink);
  min-height: 100vh;
  background-image:
    radial-gradient(circle at 20% 10%, var(--primary-soft) 0%, transparent 30%),
    radial-gradient(circle at 80% 80%, var(--accent-soft) 0%, transparent 35%);
}

.container {
  max-width: 1100px;
  margin: 0 auto;
  padding: 24px 20px 60px;
}

/* ===== 헤더 ===== */
.header {
  background: var(--surface);
  border: var(--border);
  border-radius: var(--radius);
  padding: 24px 28px;
  margin-bottom: 20px;
  box-shadow: var(--shadow);
  display: flex;
  justify-content: space-between;
  align-items: center;
  flex-wrap: wrap;
  gap: 12px;
}

.header h1 {
  font-family: 'Gaegu', cursive;
  font-size: 38px;
  letter-spacing: -1px;
  line-height: 1;
}

.header h1 .emoji { display: inline-block; transform: translateY(2px); }

.header p {
  font-size: 14px;
  color: var(--ink-soft);
  margin-top: 4px;
}

.admin-btn {
  background: var(--ink);
  color: var(--surface);
  border: var(--border);
  border-radius: 12px;
  padding: 10px 16px;
  font-family: inherit;
  font-weight: 600;
  font-size: 14px;
  cursor: pointer;
  box-shadow: var(--shadow-sm);
  transition: transform 0.15s, box-shadow 0.15s;
}
.admin-btn:hover { transform: translate(-1px,-1px); box-shadow: 4px 4px 0 var(--ink); }
.admin-btn:active { transform: translate(1px,1px); box-shadow: 1px 1px 0 var(--ink); }
.admin-btn.on { background: var(--primary); }

/* ===== 탭 네비게이션 ===== */
.tabs {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 8px;
  background: var(--surface);
  border: var(--border);
  border-radius: var(--radius);
  padding: 10px;
  margin-bottom: 20px;
  box-shadow: var(--shadow);
}

.tab {
  background: transparent;
  border: var(--border-thin);
  border-radius: 12px;
  padding: 12px 8px;
  font-family: inherit;
  font-weight: 600;
  font-size: 14px;
  cursor: pointer;
  color: var(--ink);
  transition: all 0.15s;
}
.tab:hover { background: var(--bg-2); }
.tab.active {
  background: var(--ink);
  color: var(--surface);
  border-color: var(--ink);
}
.tab .emoji { display: block; font-size: 22px; margin-bottom: 4px; }

/* ===== 공통 카드 ===== */
.card {
  background: var(--surface);
  border: var(--border);
  border-radius: var(--radius);
  padding: 24px;
  box-shadow: var(--shadow);
  margin-bottom: 16px;
}
.card h2 {
  font-family: 'Gaegu', cursive;
  font-size: 28px;
  margin-bottom: 16px;
}
.card h3 {
  font-size: 18px;
  font-weight: 700;
  margin-bottom: 12px;
}

.child-selector {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
  margin-bottom: 16px;
}
.child-selector button {
  padding: 16px;
  background: var(--surface);
  border: var(--border);
  border-radius: 14px;
  font-family: 'Gaegu', cursive;
  font-size: 24px;
  cursor: pointer;
  box-shadow: var(--shadow-sm);
  transition: all 0.15s;
  color: var(--ink);
}
.child-selector button:hover { transform: translate(-1px,-1px); box-shadow: 4px 4px 0 var(--ink); }
.child-selector button.active {
  background: var(--primary);
  color: var(--surface);
  border-color: var(--ink);
}

/* ===== 홈 자녀 카드 ===== */
.kids-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 16px;
}
@media (max-width: 720px) {
  .kids-grid { grid-template-columns: 1fr; }
  .tabs { grid-template-columns: repeat(3, 1fr); }
  .tabs .tab:nth-child(4), .tabs .tab:nth-child(5) { grid-column: span 1; }
  .header h1 { font-size: 30px; }
  .child-selector button { font-size: 20px; }
}

.kid-card { background: var(--surface); }
.kid-card.pink { background: linear-gradient(160deg, #FFEEE5 0%, #FFFFFF 60%); }
.kid-card.mint { background: linear-gradient(160deg, #E3F3E9 0%, #FFFFFF 60%); }

.kid-name {
  font-family: 'Gaegu', cursive;
  font-size: 32px;
  margin-bottom: 4px;
}
.balance-big {
  font-size: 14px;
  color: var(--ink-soft);
  margin-bottom: 6px;
}
.balance-amount {
  font-size: 36px;
  font-weight: 700;
  color: var(--primary);
  font-family: 'IBM Plex Sans KR', sans-serif;
  margin-bottom: 16px;
  letter-spacing: -1px;
}
.balance-amount .unit { font-size: 18px; color: var(--ink-soft); font-weight: 500; margin-left: 4px; }

.reward-grid { display: grid; gap: 8px; }

.reward-cat-tabs {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  margin-bottom: 12px;
}
.reward-cat-btn {
  padding: 6px 12px;
  border: var(--border-thin);
  border-radius: 14px;
  background: var(--surface);
  font-family: inherit;
  font-weight: 600;
  font-size: 12px;
  cursor: pointer;
  color: var(--ink);
  transition: all 0.15s;
}
.reward-cat-btn.active {
  background: var(--ink);
  color: var(--surface);
}
.reward-cat-btn:hover:not(.active) { background: var(--bg-2); }

.reward-btn {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 14px 18px;
  background: var(--accent);
  color: var(--surface);
  border: var(--border-thin);
  border-color: var(--ink);
  border-radius: 12px;
  font-family: inherit;
  font-weight: 600;
  cursor: pointer;
  box-shadow: var(--shadow-sm);
  transition: all 0.15s;
  font-size: 15px;
}
.reward-btn:hover:not(:disabled) { transform: translate(-1px,-1px); box-shadow: 4px 4px 0 var(--ink); }
.reward-btn:disabled { opacity: 0.5; cursor: not-allowed; }
.reward-btn .amount { font-family: 'IBM Plex Sans KR', sans-serif; font-weight: 700; font-size: 16px; }

.undo-btn {
  margin-top: 12px;
  padding: 12px;
  width: 100%;
  background: var(--bg-2);
  color: var(--ink);
  border: var(--border-thin);
  border-radius: 12px;
  font-family: inherit;
  font-weight: 600;
  cursor: pointer;
  font-size: 13px;
  transition: background 0.15s;
}
.undo-btn:hover { background: var(--primary-soft); }

/* ===== 자산 페이지 ===== */
.asset-row {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 12px;
  margin-bottom: 16px;
}
@media (max-width: 720px) { .asset-row { grid-template-columns: 1fr 1fr; } }

.asset-box {
  padding: 16px;
  border: var(--border-thin);
  border-radius: 14px;
  background: var(--bg);
}
.asset-box.cash { background: var(--primary-soft); }
.asset-box.stock { background: var(--accent-soft); }
.asset-box.savings { background: #FFF4D6; }
.asset-box.total { background: var(--ink); color: var(--surface); border-color: var(--ink); }

.asset-label { font-size: 12px; opacity: 0.8; margin-bottom: 4px; font-weight: 500; }
.asset-value { font-size: 22px; font-weight: 700; letter-spacing: -0.5px; }
.asset-value .unit { font-size: 13px; opacity: 0.7; font-weight: 500; margin-left: 2px; }
.asset-sub { font-size: 11px; opacity: 0.7; margin-top: 4px; }

/* ===== 거래 내역 ===== */
.tx-list {
  max-height: 320px;
  overflow-y: auto;
  display: grid;
  gap: 8px;
}
.tx-item {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 12px 14px;
  background: var(--bg);
  border: var(--border-thin);
  border-radius: 10px;
  font-size: 14px;
}
.tx-desc { font-weight: 600; }
.tx-time { font-size: 11px; color: var(--ink-soft); margin-top: 2px; }
.tx-amount { font-weight: 700; font-size: 16px; }
.tx-amount.plus { color: var(--accent); }
.tx-amount.minus { color: var(--danger); }

/* ===== 상점 ===== */
.shop-category-tabs {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  margin-bottom: 16px;
}
.shop-cat-btn {
  padding: 8px 14px;
  border: var(--border-thin);
  border-radius: 20px;
  background: var(--surface);
  font-family: inherit;
  font-weight: 600;
  font-size: 13px;
  cursor: pointer;
  transition: all 0.15s;
}
.shop-cat-btn.active { background: var(--ink); color: var(--surface); }
.shop-cat-btn:hover:not(.active) { background: var(--bg-2); }

.shop-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(230px, 1fr));
  gap: 14px;
}

.shop-item {
  border: var(--border-thin);
  border-radius: 14px;
  padding: 16px;
  background: var(--surface);
  display: flex;
  flex-direction: column;
  transition: all 0.15s;
}
.shop-item:hover { transform: translate(-1px,-1px); box-shadow: var(--shadow-sm); }
.shop-item.affordable { border-color: var(--accent); }

.shop-item.custom-item {
  background: linear-gradient(135deg, #FFF4D6 0%, #FFE8B0 100%);
  border: 3px dashed var(--gold);
}
.custom-hint {
  font-size: 11px;
  color: var(--ink-soft);
  margin-bottom: 8px;
  font-style: italic;
}
.custom-price-input {
  width: 100%;
  padding: 10px 12px;
  border: var(--border-thin);
  border-radius: 8px;
  font-family: inherit;
  font-size: 16px;
  font-weight: 700;
  margin-bottom: 8px;
  background: var(--surface);
  text-align: right;
}
.custom-price-input:focus {
  outline: none;
  border-color: var(--gold);
  box-shadow: 0 0 0 3px rgba(228, 169, 76, 0.2);
}

.shop-emoji { font-size: 36px; margin-bottom: 8px; }
.shop-name { font-weight: 600; font-size: 14px; margin-bottom: 4px; flex: 1; }
.shop-price { font-weight: 700; font-size: 18px; color: var(--primary); margin-bottom: 10px; }
.shop-buy {
  padding: 10px;
  background: var(--accent);
  color: var(--surface);
  border: var(--border-thin);
  border-radius: 10px;
  font-family: inherit;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.15s;
}
.shop-buy:hover:not(:disabled) { background: #2f6148; }
.shop-buy:disabled { background: #CCC; cursor: not-allowed; color: #888; }

/* ===== 주식 ===== */
.stock-list { display: grid; gap: 12px; }
.stock-row {
  padding: 16px;
  border: var(--border-thin);
  border-radius: 14px;
  background: var(--surface);
  display: grid;
  grid-template-columns: 2fr 1fr 1fr auto;
  align-items: center;
  gap: 12px;
}
@media (max-width: 720px) {
  .stock-row { grid-template-columns: 1fr 1fr; }
  .stock-row .stock-info-col { grid-column: 1 / -1; }
}
.stock-info-col { display: flex; flex-direction: column; }
.stock-ticker { font-family: 'IBM Plex Sans KR', monospace; font-size: 11px; color: var(--ink-soft); }
.stock-name { font-weight: 700; font-size: 16px; }
.stock-price-col { text-align: right; }
.stock-price { font-weight: 700; font-size: 18px; }
.stock-change { font-size: 12px; font-weight: 600; margin-top: 2px; }
.stock-change.up { color: var(--danger); }
.stock-change.down { color: #2B5AC4; }
.stock-held { font-size: 12px; color: var(--ink-soft); text-align: center; }
.stock-held strong { font-size: 15px; color: var(--ink); display: block; }
.stock-actions { display: flex; gap: 6px; }
.stock-btn {
  padding: 8px 14px;
  border: var(--border-thin);
  border-radius: 8px;
  font-family: inherit;
  font-weight: 600;
  cursor: pointer;
  font-size: 13px;
  background: var(--surface);
  transition: all 0.1s;
}
.stock-btn.buy { background: var(--danger); color: var(--surface); }
.stock-btn.sell { background: #2B5AC4; color: var(--surface); }
.stock-btn:hover:not(:disabled) { transform: translateY(-1px); }
.stock-btn:disabled { opacity: 0.4; cursor: not-allowed; }

.market-info {
  background: var(--bg-2);
  border: var(--border-thin);
  border-radius: 12px;
  padding: 14px 16px;
  margin-bottom: 16px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  flex-wrap: wrap;
  gap: 8px;
}
.market-info .label { font-size: 13px; color: var(--ink-soft); }
.market-info .value { font-weight: 700; }

/* ===== 예금 ===== */
.deposit-options {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
  gap: 12px;
  margin-bottom: 16px;
}
.deposit-option {
  padding: 16px;
  border: var(--border-thin);
  border-radius: 12px;
  background: #FFF8D6;
  text-align: center;
}
.deposit-option .period { font-weight: 700; font-size: 16px; }
.deposit-option .rate { font-size: 24px; font-weight: 700; color: var(--gold); margin: 6px 0; font-family: 'IBM Plex Sans KR'; }
.deposit-option .desc { font-size: 11px; color: var(--ink-soft); }

.deposit-form {
  display: grid;
  grid-template-columns: 1fr 1fr auto;
  gap: 8px;
  margin-bottom: 16px;
}
@media (max-width: 720px) { .deposit-form { grid-template-columns: 1fr; } }

.form-input, .form-select {
  padding: 12px;
  border: var(--border-thin);
  border-radius: 10px;
  font-family: inherit;
  font-size: 14px;
  background: var(--surface);
}

.deposit-list {
  display: grid;
  gap: 10px;
}
.deposit-item {
  padding: 14px;
  border: var(--border-thin);
  border-radius: 12px;
  background: #FFF8D6;
}
.deposit-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
.deposit-amount { font-weight: 700; font-size: 16px; }
.deposit-progress { height: 8px; background: var(--surface); border: 1px solid var(--ink); border-radius: 4px; overflow: hidden; margin: 8px 0; }
.deposit-progress-bar { height: 100%; background: var(--gold); transition: width 0.5s; }
.deposit-meta { font-size: 12px; color: var(--ink-soft); display: flex; justify-content: space-between; }
.withdraw-btn {
  margin-top: 8px;
  padding: 8px 14px;
  background: var(--ink);
  color: var(--surface);
  border: var(--border-thin);
  border-radius: 8px;
  font-family: inherit;
  font-weight: 600;
  cursor: pointer;
  font-size: 12px;
}
.withdraw-btn.ready { background: var(--accent); }

/* ===== 쿠폰 ===== */
.coupon-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
  gap: 14px;
}
.coupon {
  background: linear-gradient(135deg, #FFF4D6, #FFE8B0);
  border: 3px dashed var(--ink);
  border-radius: 14px;
  padding: 18px;
  position: relative;
  overflow: hidden;
}
.coupon.used { opacity: 0.5; background: var(--bg-2); }
.coupon .emoji { font-size: 32px; margin-bottom: 6px; }
.coupon .coupon-name { font-weight: 700; font-size: 16px; margin-bottom: 4px; }
.coupon .coupon-owner { font-size: 12px; color: var(--ink-soft); font-weight: 600; }
.coupon .coupon-date { font-size: 11px; color: var(--ink-soft); margin-top: 4px; }
.coupon .coupon-price { display: inline-block; padding: 3px 8px; background: var(--primary); color: var(--surface); border-radius: 6px; font-size: 11px; font-weight: 700; margin-top: 6px; }
.coupon-actions { display: flex; gap: 6px; margin-top: 10px; }
.coupon .use-btn, .coupon .del-btn {
  padding: 6px 12px;
  border: var(--border-thin);
  border-radius: 8px;
  font-family: inherit;
  font-weight: 600;
  cursor: pointer;
  font-size: 12px;
  flex: 1;
}
.coupon .use-btn { background: var(--accent); color: var(--surface); }
.coupon .del-btn { background: var(--surface); color: var(--ink); }
.coupon .used-stamp {
  position: absolute;
  top: 14px;
  right: 14px;
  color: var(--danger);
  font-weight: 700;
  font-size: 14px;
  border: 2px solid var(--danger);
  padding: 2px 6px;
  border-radius: 4px;
  transform: rotate(8deg);
}

/* ===== 빈 상태 ===== */
.empty {
  text-align: center;
  padding: 32px;
  color: var(--ink-soft);
  font-size: 14px;
}

/* ===== 토스트 ===== */
.toast {
  position: fixed;
  top: 20px;
  right: 20px;
  padding: 14px 20px;
  background: var(--ink);
  color: var(--surface);
  border-radius: 10px;
  box-shadow: var(--shadow-sm);
  font-weight: 600;
  font-size: 14px;
  z-index: 2000;
  animation: slideIn 0.3s ease;
  max-width: 320px;
}
.toast.success { background: var(--accent); }
.toast.error { background: var(--danger); }

@keyframes slideIn {
  from { transform: translateX(120%); }
  to { transform: translateX(0); }
}

/* ===== 모달 ===== */
.modal {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.4);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 3000;
  padding: 20px;
}
.modal-content {
  background: var(--surface);
  border: var(--border);
  border-radius: var(--radius);
  padding: 28px;
  max-width: 420px;
  width: 100%;
  box-shadow: var(--shadow);
}
.modal-content h3 {
  font-family: 'Gaegu', cursive;
  font-size: 26px;
  margin-bottom: 12px;
}
.modal-content p { font-size: 14px; color: var(--ink-soft); margin-bottom: 16px; }
.modal-input {
  width: 100%;
  padding: 12px;
  border: var(--border-thin);
  border-radius: 10px;
  font-family: inherit;
  font-size: 15px;
  margin-bottom: 16px;
}
.modal-buttons { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.modal-buttons button {
  padding: 12px;
  border: var(--border-thin);
  border-radius: 10px;
  font-family: inherit;
  font-weight: 600;
  cursor: pointer;
  font-size: 14px;
}
.modal-buttons .cancel { background: var(--bg); }
.modal-buttons .confirm { background: var(--primary); color: var(--surface); }

/* Admin 섹션 */
.admin-section {
  background: #FFF4D6;
  border: var(--border-thin);
  border-radius: 12px;
  padding: 14px;
  margin-top: 12px;
}
.admin-section h4 { font-size: 14px; margin-bottom: 8px; }
.admin-row { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; font-size: 13px; }
.admin-row input { padding: 8px; border: var(--border-thin); border-radius: 6px; font-family: inherit; font-size: 13px; width: 100px; }
.admin-row button { padding: 8px 12px; background: var(--ink); color: var(--surface); border: var(--border-thin); border-radius: 6px; font-family: inherit; font-weight: 600; cursor: pointer; font-size: 12px; }

.hidden { display: none !important; }

/* Firebase 연결 상태 */
.sync-indicator {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 4px 10px;
  border-radius: 14px;
  font-size: 11px;
  font-weight: 600;
  background: var(--bg-2);
  border: 1px solid var(--ink);
  margin-left: 8px;
}
.sync-indicator .dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: #aaa;
}
.sync-indicator.online .dot { background: var(--accent); animation: pulse 2s infinite; }
.sync-indicator.offline .dot { background: var(--danger); }
.sync-indicator.syncing .dot { background: var(--gold); animation: pulse 0.8s infinite; }
@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.4; }
}

/* 스크롤바 */

/* =========================================================

========================================================= */
function mergeWithDefaults(saved) {
  const merged = { ...structuredClone(DEFAULT_STATE), ...(saved || {}) };
  // 자녀 정보: gender 같은 새 속성이 누락되면 기본값으로 채움
  const defaultKids = DEFAULT_STATE.kids;
  merged.kids = (saved?.kids || defaultKids).map((k, i) => ({
    ...defaultKids[i],  // 기본값(gender 등) 먼저 깔고
    ...k                 // 저장된 값(이름, 잔액)이 덮어씀
  }));
  merged.stocks       = { ...DEFAULT_STATE.stocks, ...((saved?.stocks) || {}) };
  merged.holdings     = saved?.holdings     || {};
  merged.deposits     = saved?.deposits     || [];
  merged.coupons      = saved?.coupons      || [];
  merged.transactions = saved?.transactions || [];
  return merged;
}

// 로컬 백업 (오프라인 대비)
function loadLocalBackup() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return null;
    return mergeWithDefaults(JSON.parse(raw));
  } catch (e) {
    return null;
  }
}

function saveLocalBackup() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); } catch(e) {}
}

// 연결 상태 UI
function updateSyncBadge(status, text) {
  const badge = document.getElementById('sync-badge');
  const textEl = document.getElementById('sync-text');
  if (!badge) return;
  badge.className = 'sync-indicator ' + status;
  if (textEl) textEl.textContent = text;
}

function initFirebase() {
  const fb = window.__firebase;
  if (!fb) {
    // Firebase 로드 실패 시 로컬 모드로 작동
    console.warn('Firebase 사용 불가 - 로컬 모드');
    updateSyncBadge('offline', '오프라인 모드');
    const backup = loadLocalBackup();
    if (backup) state = backup;
    initialLoadDone = true;
    render();
    return;
  }

  // 1) 연결 상태 감지
  fb.onValue(fb.connRef, (snap) => {
    isOnline = !!snap.val();
    if (isOnline) {
      updateSyncBadge('online', '실시간 연결됨');
    } else {
      updateSyncBadge('offline', '연결 끊김 (로컬 저장)');
    }
  });

  // 2) 데이터 실시간 구독 (누가 바꾸든 즉시 반영)
  fb.onValue(fb.dbRef, (snap) => {
    const data = snap.val();
    if (data) {
      // Firebase 데이터 수신 → state 갱신
      state = mergeWithDefaults(data);
      saveLocalBackup();
    } else {
      // 첫 사용: Firebase가 비어있음. 로컬 백업이 있으면 업로드
      const backup = loadLocalBackup();
      if (backup) state = backup;
      // 곧바로 업로드 (빈 DB 초기화)
      scheduleSave(true);
    }
    initialLoadDone = true;
    render();
  }, (err) => {
    console.error('Firebase 읽기 실패:', err);
    updateSyncBadge('offline', '연결 실패');
    const backup = loadLocalBackup();
    if (backup) state = backup;
    initialLoadDone = true;
    render();
  });
}

// 저장(=Firebase 업로드). 짧은 시간에 여러 번 호출되면 묶어서 한 번만 전송(디바운스)
function scheduleSave(immediate = false) {
  saveLocalBackup(); // 로컬 백업은 즉시
  const fb = window.__firebase;
  if (!fb) return;

  updateSyncBadge('syncing', '동기화 중...');
  clearTimeout(saveTimer);
  const delay = immediate ? 0 : 250;
  saveTimer = setTimeout(async () => {
    try {
      await fb.set(fb.dbRef, state);
      if (isOnline) updateSyncBadge('online', '실시간 연결됨');
    } catch (e) {
      console.error('저장 실패:', e);
      updateSyncBadge('offline', '저장 실패 (로컬 보관됨)');
    }
  }, delay);
}

function saveState() { scheduleSave(); }

/* =========================================================

const uid = () => Math.random().toString(36).slice(2, 10);
const now = () => new Date().toISOString();
const fmt = (n) => Math.round(n).toLocaleString('ko-KR');
const todayKey = () => new Date().toISOString().slice(0,10);

function getKid(id) { return state.kids.find(k => k.id === id); }

function getHeld(kidId, ticker) {
  return (state.holdings[kidId] && state.holdings[kidId][ticker]) || 0;
}
function setHeld(kidId, ticker, shares) {
  if (!state.holdings[kidId]) state.holdings[kidId] = {};
  state.holdings[kidId][ticker] = shares;
  if (shares <= 0) delete state.holdings[kidId][ticker];
}

function calcStockValue(kidId) {
  const h = state.holdings[kidId] || {};
  return Object.keys(h).reduce((sum, t) => sum + h[t] * (state.stocks[t]?.price || 0), 0);
}

function calcActiveDeposits(kidId) {
  return state.deposits.filter(d => d.kidId === kidId && !d.withdrawnAt);
}

function calcDepositValue(kidId) {
  return calcActiveDeposits(kidId).reduce((sum, d) => sum + calcDepositCurrentValue(d), 0);
}

function calcDepositCurrentValue(deposit) {
  const start = new Date(deposit.startTs);
  const now = new Date();
  const daysPassed = Math.max(0, (now - start) / (1000 * 60 * 60 * 24));
  // 단리: 원금 * (1 + 연이율 * (일수/365))
  return deposit.amount * (1 + deposit.rate * (daysPassed / 365));
}

function isDepositMature(deposit) {
  if (deposit.termDays === 0) return true;
  const start = new Date(deposit.startTs);
  const mature = new Date(start.getTime() + deposit.termDays * 24 * 60 * 60 * 1000);
  return new Date() >= mature;
}

function addTx(kidId, type, amount, desc) {
  const tx = { id: uid(), kidId, type, amount, desc, ts: now() };
  state.transactions.unshift(tx);
  // 잔액 업데이트
  const kid = getKid(kidId);
  if (kid) kid.balance += amount;
}

/* =========================================================
   주식 가격 자동 변동 (하루 1회)
========================================================= */
function updateStockPricesIfNeeded() {
  const today = todayKey();
  if (state.lastStockUpdate === today) return;

  Object.keys(state.stocks).forEach(ticker => {
    const stock = state.stocks[ticker];
    // -3% ~ +3% 랜덤 변동, 기준가의 ±30% 이내로 제한
    const change = (Math.random() - 0.5) * 0.06; // ±3%
    let newPrice = stock.price * (1 + change);
    const floor = stock.base * 0.7;
    const ceil  = stock.base * 1.3;
    newPrice = Math.min(Math.max(newPrice, floor), ceil);
    // 종목별 호가단위 맞추기 (간단히 100원 반올림, 1000원 이상은 1000원 단위)
    const tick = newPrice >= 100000 ? 1000 : 100;
    stock.price = Math.round(newPrice / tick) * tick;
  });
  state.lastStockUpdate = today;
  saveState();
}

function toast(msg, type = 'success') {
  const el = document.createElement('div');
  el.className = `toast ${type}`;
  el.textContent = msg;
  document.body.appendChild(el);
  setTimeout(() => { el.style.opacity = '0'; el.style.transition = 'opacity 0.3s'; }, 2400);
  setTimeout(() => el.remove(), 2800);
}

function passwordModal(callback) {
  const modal = document.createElement('div');
  modal.className = 'modal';

    <div class="modal-content">

      <p>관리 기능을 사용하려면 비밀번호를 입력하세요.</p>
      <input type="password" class="modal-input" id="pw-input" placeholder="비밀번호" autofocus>
      <div class="modal-buttons">
        <button class="cancel" id="pw-cancel">취소</button>
        <button class="confirm" id="pw-confirm">확인</button>
      </div>
    </div>
  `;
  document.body.appendChild(modal);
  const input = modal.querySelector('#pw-input');
  input.focus();
  const close = () => modal.remove();
  modal.querySelector('#pw-cancel').onclick = close;
  modal.querySelector('#pw-confirm').onclick = () => {
    if (input.value === state.adminPassword) { close(); callback(); }
    else { toast('비밀번호가 틀렸습니다', 'error'); input.value = ''; input.focus(); }
  };
  input.onkeypress = (e) => { if (e.key === 'Enter') modal.querySelector('#pw-confirm').click(); };
  modal.onclick = (e) => { if (e.target === modal) close(); };
}

function confirmModal(title, msg, callback) {
  const modal = document.createElement('div');
  modal.className = 'modal';
  modal.innerHTML = `
    <div class="modal-content">
      <h3>${title}</h3>
      <p>${msg}</p>
      <div class="modal-buttons">
        <button class="cancel">취소</button>
        <button class="confirm">확인</button>
      </div>
    </div>
  `;
  document.body.appendChild(modal);
  modal.querySelector('.cancel').onclick = () => modal.remove();
  modal.querySelector('.confirm').onclick = () => { modal.remove(); callback(); };
  modal.onclick = (e) => { if (e.target === modal) modal.remove(); };
}

/* =========================================================
   액션들
========================================================= */
function addReward(kidId, rewardId) {
  const r = REWARDS.find(x => x.id === rewardId);
  if (!r) return;
  addTx(kidId, 'reward', r.amount, r.name);
  saveState();
  render();
  toast(`${getKid(kidId).name}이(가) ${fmt(r.amount)}원 받았어요! 🎉`);
}

function undoLastReward(kidId) {
  const last = state.transactions.find(t => t.kidId === kidId && t.type === 'reward');
  if (!last) { toast('취소할 보상이 없어요', 'error'); return; }
  const kid = getKid(kidId);
  if (kid.balance < last.amount) { toast('잔액이 모자라서 취소할 수 없어요', 'error'); return; }
  kid.balance -= last.amount;
  state.transactions = state.transactions.filter(t => t.id !== last.id);
  saveState();
  render();
  toast(`마지막 보상 취소됨`);
}

function buyItem(kidId, categoryKey, itemId, customPrice = null) {
  const cat = SHOP[categoryKey];
  const item = cat.items.find(x => x.id === itemId);
  if (!item) return;
  const kid = getKid(kidId);

  // 자유 금액 상품이면 customPrice 사용
  let finalPrice;
  let finalName;
  if (item.custom) {
    const amount = parseInt(customPrice);
    if (!amount || amount < 100) { toast('100원 이상 입력해주세요', 'error'); return; }
    if (amount > 1000000) { toast('1,000,000원 이하로 입력해주세요', 'error'); return; }
    finalPrice = amount;
    finalName = `${item.name} (${fmt(amount)}원)`;
  } else {
    finalPrice = item.price;
    finalName = item.name;
  }

  if (kid.balance < finalPrice) { toast('잔액이 부족해요', 'error'); return; }

  // 잔액 차감
  addTx(kidId, 'purchase', -finalPrice, `${finalName} 구매`);
  // 쿠폰 발행
  const coupon = {
    id: uid(),
    kidId,
    itemId,
    category: categoryKey,
    name: finalName,
    emoji: item.emoji,
    price: finalPrice,
    ts: now(),
    used: false,
    isCustom: !!item.custom
  };
  state.coupons.unshift(coupon);
  saveState();
  render();
  toast(`${finalName} 쿠폰이 발행됐어요! 🎟️`);
}

function useCoupon(couponId) {
  const c = state.coupons.find(x => x.id === couponId);
  if (!c || c.used) return;
  c.used = true;
  c.usedAt = now();
  saveState();
  render();
  toast(`${c.name} 쿠폰 사용됨 ✅`);
}

function deleteCoupon(couponId) {
  confirmModal('쿠폰 삭제', '이 쿠폰을 정말 삭제할까요? (환불되지 않아요)', () => {
    state.coupons = state.coupons.filter(c => c.id !== couponId);
    saveState();
    render();
    toast('쿠폰이 삭제됐어요');
  });
}

function buyStock(kidId, ticker, shares) {
  shares = parseInt(shares);
  if (!shares || shares < 1) return;
  const stock = state.stocks[ticker];
  const cost = stock.price * shares;
  const kid = getKid(kidId);
  if (kid.balance < cost) { toast('잔액이 부족해요', 'error'); return; }
  addTx(kidId, 'stock_buy', -cost, `${stock.name} ${shares}주 매수 @${fmt(stock.price)}원`);
  setHeld(kidId, ticker, getHeld(kidId, ticker) + shares);
  saveState();
  render();
  toast(`${stock.name} ${shares}주 매수 완료 📈`);
}

function sellStock(kidId, ticker, shares) {
  shares = parseInt(shares);
  if (!shares || shares < 1) return;
  const held = getHeld(kidId, ticker);
  if (held < shares) { toast('보유 주식이 부족해요', 'error'); return; }
  const stock = state.stocks[ticker];
  const proceeds = stock.price * shares;
  addTx(kidId, 'stock_sell', proceeds, `${stock.name} ${shares}주 매도 @${fmt(stock.price)}원`);
  setHeld(kidId, ticker, held - shares);
  saveState();
  render();
  toast(`${stock.name} ${shares}주 매도 완료 💰`);
}

function deposit(kidId, amount, termKey) {
  amount = parseInt(amount);
  if (!amount || amount < 100) { toast('100원 이상 예금해주세요', 'error'); return; }
  const kid = getKid(kidId);
  if (kid.balance < amount) { toast('잔액이 부족해요', 'error'); return; }
  const term = DEPOSIT_TERMS.find(t => t.key === termKey);
  addTx(kidId, 'deposit_in', -amount, `${term.label} 예금 가입 (연 ${(term.rate*100).toFixed(1)}%)`);
  state.deposits.push({
    id: uid(),
    kidId,
    amount,
    startTs: now(),
    termDays: term.days,
    rate: term.rate
  });
  saveState();
  render();
  toast(`${fmt(amount)}원 예금 가입 완료 🏦`);
}

function withdrawDeposit(depositId, force = false) {
  const d = state.deposits.find(x => x.id === depositId);
  if (!d) return;
  const mature = isDepositMature(d);
  if (!mature && !force) {
    confirmModal('중도 해지', '아직 만기 전이에요. 중도 해지하면 이자가 절반만 붙어요. 계속할까요?', () => {
      withdrawDeposit(depositId, true);
    });
    return;
  }
  const currentValue = calcDepositCurrentValue(d);
  const interest = currentValue - d.amount;
  const finalAmount = mature ? currentValue : d.amount + interest * 0.5;
  d.withdrawnAt = now();
  addTx(d.kidId, 'deposit_out', Math.round(finalAmount), mature ? `예금 만기 해지 (+이자 ${fmt(finalAmount - d.amount)}원)` : `예금 중도 해지`);
  saveState();
  render();
  toast(mature ? `만기 해지! ${fmt(finalAmount)}원 입금됨 🎊` : `중도 해지됨`);
}

/* =========================================================
   뷰 렌더링
========================================================= */
function render() {
  if (!initialLoadDone) return; // Firebase 초기 로드 전에는 렌더 생략
  updateStockPricesIfNeeded();
  document.querySelectorAll('.tab').forEach(t => {
    t.classList.toggle('active', t.dataset.view === currentView);
  });
  const view = document.getElementById('view');
  if      (currentView === 'home')   view.innerHTML = renderHome();
  else if (currentView === 'assets') view.innerHTML = renderAssets();
  else if (currentView === 'shop')   view.innerHTML = renderShop();
  else if (currentView === 'stock')  view.innerHTML = renderStock();
  else if (currentView === 'bank')   view.innerHTML = renderBank();
  attachHandlers();
}

                      </div>
                      ${d.termDays > 0 ? `
                        <div class="deposit-progress"><div class="deposit-progress-bar" style="width:${progress}%;"></div></div>
                        <div class="deposit-meta">
                          <span>진행 ${progress.toFixed(0)}%</span>
                          <span>만기: ${matureDate.toLocaleDateString('ko-KR')}</span>
                        </div>
                      ` : `<div class="deposit-meta"><span>자유 예금 (언제든 출금)</span></div>`}
                      <button class="withdraw-btn ${mature ? 'ready' : ''}" data-action="withdraw" data-id="${d.id}">
                        ${mature ? '✓ 만기 출금' : '중도 해지'}
                      </button>
                    </div>
                  `;
                }).join('')}
              </div>
            `}
          </div>
        `;
      }).join('')}
    </div>
  `;
}

/* =========================================================
   이벤트 바인딩
========================================================= */
function attachHandlers() {
  document.querySelectorAll('[data-action]').forEach(el => {
    el.onclick = () => {
      const a = el.dataset.action;
      if (a === 'reward')         addReward(el.dataset.kid, el.dataset.reward);
      else if (a === 'undo')      undoLastReward(el.dataset.kid);
      else if (a === 'reward-cat'){ rewardCat[el.dataset.kid] = el.dataset.cat; render(); }
      else if (a === 'select-kid'){ selectedChild = el.dataset.kid; render(); }
      else if (a === 'clear-selected'){ selectedChild = null; render(); }
      else if (a === 'cat')       { shopCategory = el.dataset.cat; render(); }
      else if (a === 'buy')       buyItem(selectedChild, el.dataset.cat, el.dataset.item);
      else if (a === 'buy-custom'){
        const price = document.getElementById(`custom-${el.dataset.item}`).value;
        buyItem(selectedChild, el.dataset.cat, el.dataset.item, price);
      }
      else if (a === 'use-coupon')useCoupon(el.dataset.id);
      else if (a === 'del-coupon')deleteCoupon(el.dataset.id);
      else if (a === 'stock-buy') {
        const q = document.getElementById(`buy-${el.dataset.kid}-${el.dataset.ticker}`).value;
        buyStock(el.dataset.kid, el.dataset.ticker, q);
      }
      else if (a === 'stock-sell') {
        const q = document.getElementById(`sell-${el.dataset.kid}-${el.dataset.ticker}`).value;
        sellStock(el.dataset.kid, el.dataset.ticker, q);
      }
      else if (a === 'deposit') {
        const amount = document.getElementById(`dep-amount-${el.dataset.kid}`).value;
        const term = document.getElementById(`dep-term-${el.dataset.kid}`).value;
        deposit(el.dataset.kid, amount, term);
      }
      else if (a === 'withdraw') withdrawDeposit(el.dataset.id);
      else if (a === 'edit-balance') editBalance(el.dataset.kid);
    };
  });
}

function editBalance(kidId) {
  const kid = getKid(kidId);
  const modal = document.createElement('div');
  modal.className = 'modal';
  modal.innerHTML = `
    <div class="modal-content">
      <h3>✏️ ${kid.name} 잔액 수정</h3>
      <p>현재 잔액: ${fmt(kid.balance)}원</p>
      <input type="number" class="modal-input" id="new-balance" value="${kid.balance}">
      <div class="modal-buttons">
        <button class="cancel">취소</button>
        <button class="confirm">저장</button>
      </div>
    </div>
  `;
  document.body.appendChild(modal);
  modal.querySelector('.cancel').onclick = () => modal.remove();
  modal.querySelector('.confirm').onclick = () => {
    const v = parseInt(modal.querySelector('#new-balance').value);
    if (isNaN(v)) { toast('숫자를 입력하세요', 'error'); return; }
    const diff = v - kid.balance;
    kid.balance = v;
    state.transactions.unshift({ id: uid(), kidId, type: 'adjust', amount: diff, desc: '관리자 조정', ts: now() });
    saveState();
    modal.remove();
    render();
    toast('잔액이 수정됐어요');
  };
}

/* =========================================================
   초기화
========================================================= */
// 탭 클릭
document.querySelectorAll('.tab').forEach(t => {
  t.onclick = () => { currentView = t.dataset.view; selectedChild = null; render(); };
});

// 부모님 모드 토글
document.getElementById('admin-toggle').onclick = () => {
  if (isAdmin) {
    isAdmin = false;
    document.getElementById('admin-toggle').classList.remove('on');
    document.getElementById('admin-toggle').textContent = '🔒 부모님 모드';
    toast('부모님 모드 해제됨');
    render();
  } else {
    passwordModal(() => {
      isAdmin = true;
      document.getElementById('admin-toggle').classList.add('on');
      document.getElementById('admin-toggle').textContent = '🔓 부모님 모드 ON';
      toast('부모님 모드 활성화됨 ✓');
      render();
    });
  }
};

// Firebase가 준비되면 연결, 이미 준비되었으면 바로 호출
if (window.__firebase) {
  initFirebase();
} else {
  window.addEventListener('firebase-ready', initFirebase, { once: true });
  // Firebase가 10초 내로 로드 안 되면 로컬 모드로 폴백
  setTimeout(() => {
    if (!initialLoadDone) {
      console.warn('Firebase 로드 타임아웃 - 로컬 모드');
      initFirebase();
    }
  }, 10000);
}
