<style>
:root {
  --bg: #FFF8EF;
  --bg-2: #FFE8D6;
  --surface: #FFFFFF;
  --ink: #2B2318;
  --ink-soft: #6B5F50;
  --primary: #F26A4B;       /* 따뜻한 오렌지 */
  --primary-soft: #FFDBCF;
  --accent: #3D7A5B;        /* 저금통 초록 */
  --accent-soft: #D7EFDF;
  --gold: #E4A94C;          /* 동전 금색 */
  --danger: #D14343;
  --shadow: 6px 6px 0 #2B2318;
  --shadow-sm: 3px 3px 0 #2B2318;
  --border: 3px solid #2B2318;
  --border-thin: 2px solid #2B2318;
  --radius: 18px;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'IBM Plex Sans KR', -apple-system, sans-serif;
  background: var(--bg);
  color: var(--ink);
  min-height: 100vh;
  background-image:
    radial-gradient(circle at 20% 10%, var(--primary-soft) 0%, transparent 30%),
    radial-gradient(circle at 80% 80%, var(--accent-soft) 0%, transparent 35%);
}

.container {
  max-width: 1100px;
  margin: 0 auto;
  padding: 24px 20px 60px;
}

/* ===== 헤더 ===== */
.header {
  background: var(--surface);
  border: var(--border);
  border-radius: var(--radius);
  padding: 24px 28px;
  margin-bottom: 20px;
  box-shadow: var(--shadow);
  display: flex;
  justify-content: space-between;
  align-items: center;
  flex-wrap: wrap;
  gap: 12px;
}

.header h1 {
  font-family: 'Gaegu', cursive;
  font-size: 38px;
  letter-spacing: -1px;
  line-height: 1;
}

.header h1 .emoji { display: inline-block; transform: translateY(2px); }

.header p {
  font-size: 14px;
  color: var(--ink-soft);
  margin-top: 4px;
}

.admin-btn {
  background: var(--ink);
  color: var(--surface);
  border: var(--border);
  border-radius: 12px;
  padding: 10px 16px;
  font-family: inherit;
  font-weight: 600;
  font-size: 14px;
  cursor: pointer;
  box-shadow: var(--shadow-sm);
  transition: transform 0.15s, box-shadow 0.15s;
}
.admin-btn:hover { transform: translate(-1px,-1px); box-shadow: 4px 4px 0 var(--ink); }
.admin-btn:active { transform: translate(1px,1px); box-shadow: 1px 1px 0 var(--ink); }
.admin-btn.on { background: var(--primary); }

/* ===== 탭 네비게이션 ===== */
.tabs {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 6px;
  background: var(--surface);
  border: var(--border);
  border-radius: var(--radius);
  padding: 10px;
  margin-bottom: 20px;
  box-shadow: var(--shadow);
}

.tab {
  background: transparent;
  border: var(--border-thin);
  border-radius: 12px;
  padding: 12px 8px;
  font-family: inherit;
  font-weight: 600;
  font-size: 14px;
  cursor: pointer;
  color: var(--ink);
  transition: all 0.15s;
}
.tab:hover { background: var(--bg-2); }
.tab.active {
  background: var(--ink);
  color: var(--surface);
  border-color: var(--ink);
}
.tab .emoji { display: block; font-size: 22px; margin-bottom: 4px; }

/* ===== 공통 카드 ===== */
.card {
  background: var(--surface);
  border: var(--border);
  border-radius: var(--radius);
  padding: 24px;
  box-shadow: var(--shadow);
  margin-bottom: 16px;
}
.card h2 {
  font-family: 'Gaegu', cursive;
  font-size: 28px;
  margin-bottom: 16px;
}
.card h3 {
  font-size: 18px;
  font-weight: 700;
  margin-bottom: 12px;
}

.child-selector {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
  margin-bottom: 16px;
}
.child-selector button {
  padding: 16px;
  background: var(--surface);
  border: var(--border);
  border-radius: 14px;
  font-family: 'Gaegu', cursive;
  font-size: 24px;
  cursor: pointer;
  box-shadow: var(--shadow-sm);
  transition: all 0.15s;
  color: var(--ink);
}
.child-selector button:hover { transform: translate(-1px,-1px); box-shadow: 4px 4px 0 var(--ink); }
.child-selector button.active {
  background: var(--primary);
  color: var(--surface);
  border-color: var(--ink);
}

/* ===== 홈 자녀 카드 ===== */
.kids-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 16px;
}
@media (max-width: 720px) {
  .kids-grid { grid-template-columns: 1fr; }
  .tabs { grid-template-columns: repeat(4, 1fr); }
  .tabs .tab { font-size: 12px; padding: 10px 4px; }
  .tabs .tab .emoji { font-size: 18px; }
  .header h1 { font-size: 30px; }
  .child-selector button { font-size: 20px; }
}

.kid-card { background: var(--surface); }
.kid-card.pink { background: linear-gradient(160deg, #FFEEE5 0%, #FFFFFF 60%); }
.kid-card.mint { background: linear-gradient(160deg, #E3F3E9 0%, #FFFFFF 60%); }

.kid-name {
  font-family: 'Gaegu', cursive;
  font-size: 32px;
  margin-bottom: 4px;
}
.balance-big {
  font-size: 14px;
  color: var(--ink-soft);
  margin-bottom: 6px;
}
.balance-amount {
  font-size: 36px;
  font-weight: 700;
  color: var(--primary);
  font-family: 'IBM Plex Sans KR', sans-serif;
  margin-bottom: 16px;
  letter-spacing: -1px;
}
.balance-amount .unit { font-size: 18px; color: var(--ink-soft); font-weight: 500; margin-left: 4px; }

.reward-grid { display: grid; gap: 8px; }

.reward-cat-tabs {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  margin-bottom: 12px;
}
.reward-cat-btn {
  padding: 6px 12px;
  border: var(--border-thin);
  border-radius: 14px;
  background: var(--surface);
  font-family: inherit;
  font-weight: 600;
  font-size: 12px;
  cursor: pointer;
  color: var(--ink);
  transition: all 0.15s;
}
.reward-cat-btn.active {
  background: var(--ink);
  color: var(--surface);
}
.reward-cat-btn:hover:not(.active) { background: var(--bg-2); }

.reward-btn {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 14px 18px;
  background: var(--accent);
  color: var(--surface);
  border: var(--border-thin);
  border-color: var(--ink);
  border-radius: 12px;
  font-family: inherit;
  font-weight: 600;
  cursor: pointer;
  box-shadow: var(--shadow-sm);
  transition: all 0.15s;
  font-size: 15px;
}
.reward-btn:hover:not(:disabled) { transform: translate(-1px,-1px); box-shadow: 4px 4px 0 var(--ink); }
.reward-btn:disabled { opacity: 0.5; cursor: not-allowed; }
.reward-btn.claimed {
  background: #c8d4cc;
  color: #5a6b60;
  box-shadow: none;
  opacity: 0.85;
  position: relative;
}
.reward-btn.claimed:hover { transform: none; box-shadow: none; }
.reward-btn.claimed .amount { color: var(--accent); font-weight: 700; }
.reward-btn .amount { font-family: 'IBM Plex Sans KR', sans-serif; font-weight: 700; font-size: 16px; }

.undo-btn {
  margin-top: 12px;
  padding: 12px;
  width: 100%;
  background: var(--bg-2);
  color: var(--ink);
  border: var(--border-thin);
  border-radius: 12px;
  font-family: inherit;
  font-weight: 600;
  cursor: pointer;
  font-size: 13px;
  transition: background 0.15s;
}
.undo-btn:hover { background: var(--primary-soft); }

/* ===== 자산 페이지 ===== */
.asset-row {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 12px;
  margin-bottom: 16px;
}
@media (max-width: 720px) { .asset-row { grid-template-columns: 1fr 1fr; } }

.asset-box {
  padding: 16px;
  border: var(--border-thin);
  border-radius: 14px;
  background: var(--bg);
}
.asset-box.cash { background: var(--primary-soft); }
.asset-box.stock { background: var(--accent-soft); }
.asset-box.savings { background: #FFF4D6; }
.asset-box.total { background: var(--ink); color: var(--surface); border-color: var(--ink); }

.asset-label { font-size: 12px; opacity: 0.8; margin-bottom: 4px; font-weight: 500; }
.asset-value { font-size: 22px; font-weight: 700; letter-spacing: -0.5px; }
.asset-value .unit { font-size: 13px; opacity: 0.7; font-weight: 500; margin-left: 2px; }
.asset-sub { font-size: 11px; opacity: 0.7; margin-top: 4px; }

/* ===== 거래 내역 ===== */
.tx-list {
  max-height: 320px;
  overflow-y: auto;
  display: grid;
  gap: 8px;
}
.tx-item {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 12px 14px;
  background: var(--bg);
  border: var(--border-thin);
  border-radius: 10px;
  font-size: 14px;
}
.tx-desc { font-weight: 600; }
.tx-time { font-size: 11px; color: var(--ink-soft); margin-top: 2px; }
.tx-amount { font-weight: 700; font-size: 16px; }
.tx-amount.plus { color: var(--accent); }
.tx-amount.minus { color: var(--danger); }

/* ===== 상점 ===== */
.shop-category-tabs {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  margin-bottom: 16px;
}
.shop-cat-btn {
  padding: 8px 14px;
  border: var(--border-thin);
  border-radius: 20px;
  background: var(--surface);
  font-family: inherit;
  font-weight: 600;
  font-size: 13px;
  cursor: pointer;
  transition: all 0.15s;
}
.shop-cat-btn.active { background: var(--ink); color: var(--surface); }
.shop-cat-btn:hover:not(.active) { background: var(--bg-2); }

.shop-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(230px, 1fr));
  gap: 14px;
}

.shop-item {
  border: var(--border-thin);
  border-radius: 14px;
  padding: 16px;
  background: var(--surface);
  display: flex;
  flex-direction: column;
  transition: all 0.15s;
}
.shop-item:hover { transform: translate(-1px,-1px); box-shadow: var(--shadow-sm); }
.shop-item.affordable { border-color: var(--accent); }

.shop-item.custom-item {
  background: linear-gradient(135deg, #FFF4D6 0%, #FFE8B0 100%);
  border: 3px dashed var(--gold);
}
.shop-item.lucky-item {
  background: linear-gradient(135deg, #FFE0E8 0%, #FFD0D8 100%);
  border: 3px dashed var(--primary);
}
.shop-item.lucky-item .shop-emoji {
  animation: bounce 1.5s infinite;
}
.lucky-modal {
  text-align: center;
}
.lucky-result {
  padding: 24px 16px;
  margin: 16px 0;
  border-radius: 14px;
  background: linear-gradient(135deg, #FFF4D6, #FFE8B0);
  border: 3px dashed var(--gold);
  animation: pop 0.5s ease;
}
.lucky-result.win { background: linear-gradient(135deg, #D7EFDF, #B0E5C0); border-color: var(--accent); }
.lucky-result.lose { background: linear-gradient(135deg, #FFE0E0, #FFD0D0); border-color: var(--danger); }
@keyframes pop {
  0% { transform: scale(0.5); opacity: 0; }
  60% { transform: scale(1.1); }
  100% { transform: scale(1); opacity: 1; }
}
.custom-hint {
  font-size: 11px;
  color: var(--ink-soft);
  margin-bottom: 8px;
  font-style: italic;
}
.custom-price-input {
  width: 100%;
  padding: 10px 12px;
  border: var(--border-thin);
  border-radius: 8px;
  font-family: inherit;
  font-size: 16px;
  font-weight: 700;
  margin-bottom: 8px;
  background: var(--surface);
  text-align: right;
}
.custom-price-input:focus {
  outline: none;
  border-color: var(--gold);
  box-shadow: 0 0 0 3px rgba(228, 169, 76, 0.2);
}

.shop-emoji { font-size: 36px; margin-bottom: 8px; }
.shop-name { font-weight: 600; font-size: 14px; margin-bottom: 4px; flex: 1; }
.shop-price { font-weight: 700; font-size: 18px; color: var(--primary); margin-bottom: 10px; }
.shop-buy {
  padding: 10px;
  background: var(--accent);
  color: var(--surface);
  border: var(--border-thin);
  border-radius: 10px;
  font-family: inherit;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.15s;
}
.shop-buy:hover:not(:disabled) { background: #2f6148; }
.shop-buy:disabled { background: #CCC; cursor: not-allowed; color: #888; }

/* ===== 주식 ===== */
.stock-list { display: grid; gap: 12px; }
.stock-row {
  padding: 16px;
  border: var(--border-thin);
  border-radius: 14px;
  background: var(--surface);
  display: grid;
  grid-template-columns: 2fr 1fr 1fr auto;
  align-items: center;
  gap: 12px;
}
@media (max-width: 720px) {
  .stock-row { grid-template-columns: 1fr 1fr; }
  .stock-row .stock-info-col { grid-column: 1 / -1; }
}
.stock-info-col { display: flex; flex-direction: column; }
.stock-ticker { font-family: 'IBM Plex Sans KR', monospace; font-size: 11px; color: var(--ink-soft); }
.stock-name { font-weight: 700; font-size: 16px; }
.stock-price-col { text-align: right; }
.stock-price { font-weight: 700; font-size: 18px; }
.stock-change { font-size: 12px; font-weight: 600; margin-top: 2px; }
.stock-change.up { color: var(--danger); }
.stock-change.down { color: #2B5AC4; }
.stock-held { font-size: 12px; color: var(--ink-soft); text-align: center; }
.stock-held strong { font-size: 15px; color: var(--ink); display: block; }
.stock-actions { display: flex; gap: 6px; }
.stock-btn {
  padding: 8px 14px;
  border: var(--border-thin);
  border-radius: 8px;
  font-family: inherit;
  font-weight: 600;
  cursor: pointer;
  font-size: 13px;
  background: var(--surface);
  transition: all 0.1s;
}
.stock-btn.buy { background: var(--danger); color: var(--surface); }
.stock-btn.sell { background: #2B5AC4; color: var(--surface); }
.stock-btn:hover:not(:disabled) { transform: translateY(-1px); }
.stock-btn:disabled { opacity: 0.4; cursor: not-allowed; }

.market-info {
  background: var(--bg-2);
  border: var(--border-thin);
  border-radius: 12px;
  padding: 14px 16px;
  margin-bottom: 16px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  flex-wrap: wrap;
  gap: 8px;
}
.market-info .label { font-size: 13px; color: var(--ink-soft); }
.market-info .value { font-weight: 700; }

/* ===== 예금 ===== */
.deposit-options {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
  gap: 12px;
  margin-bottom: 16px;
}
.deposit-option {
  padding: 16px;
  border: var(--border-thin);
  border-radius: 12px;
  background: #FFF8D6;
  text-align: center;
}
.deposit-option .period { font-weight: 700; font-size: 16px; }
.deposit-option .rate { font-size: 24px; font-weight: 700; color: var(--gold); margin: 6px 0; font-family: 'IBM Plex Sans KR'; }
.deposit-option .desc { font-size: 11px; color: var(--ink-soft); }

.deposit-form {
  display: grid;
  grid-template-columns: 1fr 1fr auto;
  gap: 8px;
  margin-bottom: 16px;
}
@media (max-width: 720px) { .deposit-form { grid-template-columns: 1fr; } }

.form-input, .form-select {
  padding: 12px;
  border: var(--border-thin);
  border-radius: 10px;
  font-family: inherit;
  font-size: 14px;
  background: var(--surface);
}

.deposit-list {
  display: grid;
  gap: 10px;
}
.deposit-item {
  padding: 14px;
  border: var(--border-thin);
  border-radius: 12px;
  background: #FFF8D6;
}
.deposit-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
.deposit-amount { font-weight: 700; font-size: 16px; }
.deposit-progress { height: 8px; background: var(--surface); border: 1px solid var(--ink); border-radius: 4px; overflow: hidden; margin: 8px 0; }
.deposit-progress-bar { height: 100%; background: var(--gold); transition: width 0.5s; }
.deposit-meta { font-size: 12px; color: var(--ink-soft); display: flex; justify-content: space-between; }
.withdraw-btn {
  margin-top: 8px;
  padding: 8px 14px;
  background: var(--ink);
  color: var(--surface);
  border: var(--border-thin);
  border-radius: 8px;
  font-family: inherit;
  font-weight: 600;
  cursor: pointer;
  font-size: 12px;
}
.withdraw-btn.ready { background: var(--accent); }

/* ===== 쿠폰 ===== */
.coupon-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
  gap: 14px;
}
.coupon {
  background: linear-gradient(135deg, #FFF4D6, #FFE8B0);
  border: 3px dashed var(--ink);
  border-radius: 14px;
  padding: 18px;
  position: relative;
  overflow: hidden;
}
.coupon.used { opacity: 0.5; background: var(--bg-2); }
.coupon .emoji { font-size: 32px; margin-bottom: 6px; }
.coupon .coupon-name { font-weight: 700; font-size: 16px; margin-bottom: 4px; }
.coupon .coupon-owner { font-size: 12px; color: var(--ink-soft); font-weight: 600; }
.coupon .coupon-date { font-size: 11px; color: var(--ink-soft); margin-top: 4px; }
.coupon .coupon-price { display: inline-block; padding: 3px 8px; background: var(--primary); color: var(--surface); border-radius: 6px; font-size: 11px; font-weight: 700; margin-top: 6px; }
.coupon-actions { display: flex; gap: 6px; margin-top: 10px; }
.coupon .use-btn, .coupon .del-btn {
  padding: 6px 12px;
  border: var(--border-thin);
  border-radius: 8px;
  font-family: inherit;
  font-weight: 600;
  cursor: pointer;
  font-size: 12px;
  flex: 1;
}
.coupon .use-btn { background: var(--accent); color: var(--surface); }
.coupon .del-btn { background: var(--surface); color: var(--ink); }
.coupon .used-stamp {
  position: absolute;
  top: 14px;
  right: 14px;
  color: var(--danger);
  font-weight: 700;
  font-size: 14px;
  border: 2px solid var(--danger);
  padding: 2px 6px;
  border-radius: 4px;
  transform: rotate(8deg);
}

/* ===== 빈 상태 ===== */
.empty {
  text-align: center;
  padding: 32px;
  color: var(--ink-soft);
  font-size: 14px;
}

/* ===== 토스트 ===== */
.toast {
  position: fixed;
  top: 20px;
  right: 20px;
  padding: 14px 20px;
  background: var(--ink);
  color: var(--surface);
  border-radius: 10px;
  box-shadow: var(--shadow-sm);
  font-weight: 600;
  font-size: 14px;
  z-index: 2000;
  animation: slideIn 0.3s ease;
  max-width: 320px;
}
.toast.success { background: var(--accent); }
.toast.error { background: var(--danger); }

@keyframes slideIn {
  from { transform: translateX(120%); }
  to { transform: translateX(0); }
}

/* ===== 모달 ===== */
.modal {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.4);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 3000;
  padding: 20px;
}
.modal-content {
  background: var(--surface);
  border: var(--border);
  border-radius: var(--radius);
  padding: 28px;
  max-width: 420px;
  width: 100%;
  box-shadow: var(--shadow);
}
.modal-content h3 {
  font-family: 'Gaegu', cursive;
  font-size: 26px;
  margin-bottom: 12px;
}
.modal-content p { font-size: 14px; color: var(--ink-soft); margin-bottom: 16px; }
.modal-input {
  width: 100%;
  padding: 12px;
  border: var(--border-thin);
  border-radius: 10px;
  font-family: inherit;

/* =========================================================
   Firebase 연동
========================================================= */
function mergeWithDefaults(saved) {
  const merged = { ...structuredClone(DEFAULT_STATE), ...(saved || {}) };
  // 자녀 정보: gender 같은 새 속성이 누락되면 기본값으로 채움
  const defaultKids = DEFAULT_STATE.kids;
  merged.kids = (saved?.kids || defaultKids).map((k, i) => ({
    ...defaultKids[i],  // 기본값(gender 등) 먼저 깔고
    ...k                 // 저장된 값(이름, 잔액)이 덮어씀
  }));
  merged.stocks       = { ...DEFAULT_STATE.stocks, ...((saved?.stocks) || {}) };
  merged.holdings     = saved?.holdings     || {};
  merged.deposits     = saved?.deposits     || [];
  merged.coupons      = saved?.coupons      || [];
  merged.transactions = saved?.transactions || [];
  merged.goals        = saved?.goals        || [];
  merged.autoSavings  = saved?.autoSavings  || [];
  merged.messages     = saved?.messages     || [];
  merged.luckyBoxes   = saved?.luckyBoxes   || {};
  return merged;
}

// 로컬 백업 (오프라인 대비)
function loadLocalBackup() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return null;
    return mergeWithDefaults(JSON.parse(raw));
  } catch (e) {
    return null;
  }
}

function saveLocalBackup() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); } catch(e) {}
}

// 연결 상태 UI
function updateSyncBadge(status, text) {
  const badge = document.getElementById('sync-badge');
  const textEl = document.getElementById('sync-text');
  if (!badge) return;
  badge.className = 'sync-indicator ' + status;
  if (textEl) textEl.textContent = text;
}

function initFirebase() {
  const fb = window.__firebase;
  if (!fb) {
    // Firebase 로드 실패 시 로컬 모드로 작동
    console.warn('Firebase 사용 불가 - 로컬 모드');
    updateSyncBadge('offline', '오프라인 모드');
    const backup = loadLocalBackup();
    if (backup) state = backup;
    initialLoadDone = true;
    render();
    return;
  }

  // 1) 연결 상태 감지
  fb.onValue(fb.connRef, (snap) => {
    isOnline = !!snap.val();
    if (isOnline) {
      updateSyncBadge('online', '실시간 연결됨');
    } else {
      updateSyncBadge('offline', '연결 끊김 (로컬 저장)');
    }
  });

  // 2) 데이터 실시간 구독 (누가 바꾸든 즉시 반영)
  fb.onValue(fb.dbRef, (snap) => {
    const data = snap.val();
    if (data) {
      // Firebase 데이터 수신 → state 갱신
      state = mergeWithDefaults(data);
      saveLocalBackup();
    } else {
      // 첫 사용: Firebase가 비어있음. 로컬 백업이 있으면 업로드
      const backup = loadLocalBackup();
      if (backup) state = backup;
      // 곧바로 업로드 (빈 DB 초기화)
      scheduleSave(true);
    }
    initialLoadDone = true;
    render();
  }, (err) => {
    console.error('Firebase 읽기 실패:', err);
    updateSyncBadge('offline', '연결 실패');
    const backup = loadLocalBackup();
    if (backup) state = backup;
    initialLoadDone = true;
    render();
  });
}

// 저장(=Firebase 업로드). 짧은 시간에 여러 번 호출되면 묶어서 한 번만 전송(디바운스)
function scheduleSave(immediate = false) {
  saveLocalBackup(); // 로컬 백업은 즉시
  const fb = window.__firebase;
  if (!fb) return;

  updateSyncBadge('syncing', '동기화 중...');
  clearTimeout(saveTimer);
  const delay = immediate ? 0 : 250;
  saveTimer = setTimeout(async () => {
    try {
      await fb.set(fb.dbRef, state);
      if (isOnline) updateSyncBadge('online', '실시간 연결됨');
    } catch (e) {
      console.error('저장 실패:', e);
      updateSyncBadge('offline', '저장 실패 (로컬 보관됨)');
    }
  }, delay);
}

const uid = () => Math.random().toString(36).slice(2, 10);
const now = () => new Date().toISOString();
const fmt = (n) => Math.round(n).toLocaleString('ko-KR');
const todayKey = () => new Date().toISOString().slice(0,10);

function getKid(id) { return state.kids.find(k => k.id === id); }

function getHeld(kidId, ticker) {
  return (state.holdings[kidId] && state.holdings[kidId][ticker]) || 0;
}
function setHeld(kidId, ticker, shares) {
  if (!state.holdings[kidId]) state.holdings[kidId] = {};
  state.holdings[kidId][ticker] = shares;
  if (shares <= 0) delete state.holdings[kidId][ticker];
}

function calcStockValue(kidId) {
  const h = state.holdings[kidId] || {};
  return Object.keys(h).reduce((sum, t) => sum + h[t] * (state.stocks[t]?.price || 0), 0);
}

function calcActiveDeposits(kidId) {
  return state.deposits.filter(d => d.kidId === kidId && !d.withdrawnAt);
}

function calcDepositValue(kidId) {
  return calcActiveDeposits(kidId).reduce((sum, d) => sum + calcDepositCurrentValue(d), 0);
}

function calcDepositCurrentValue(deposit) {
  const start = new Date(deposit.startTs);
  const now = new Date();
  const daysPassed = Math.max(0, (now - start) / (1000 * 60 * 60 * 24));
  // 단리: 원금 * (1 + 연이율 * (일수/365))
  return deposit.amount * (1 + deposit.rate * (daysPassed / 365));
}

function isDepositMature(deposit) {
  if (deposit.termDays === 0) return true;
  const start = new Date(deposit.startTs);
  const mature = new Date(start.getTime() + deposit.termDays * 24 * 60 * 60 * 1000);
  return new Date() >= mature;
}

function addTx(kidId, type, amount, desc) {
  const tx = { id: uid(), kidId, type, amount, desc, ts: now() };
  state.transactions.unshift(tx);
  // 잔액 업데이트
  const kid = getKid(kidId);
  if (kid) kid.balance += amount;
}

/* =========================================================
   주식 가격 자동 변동 (하루 1회)
========================================================= */
function updateStockPricesIfNeeded() {
  const today = todayKey();
  if (state.lastStockUpdate === today) return;

  Object.keys(state.stocks).forEach(ticker => {
    const stock = state.stocks[ticker];
    // -3% ~ +3% 랜덤 변동, 기준가의 ±30% 이내로 제한
    const change = (Math.random() - 0.5) * 0.06; // ±3%
    let newPrice = stock.price * (1 + change);
    const floor = stock.base * 0.7;
    const ceil  = stock.base * 1.3;
    newPrice = Math.min(Math.max(newPrice, floor), ceil);
    // 종목별 호가단위 맞추기 (간단히 100원 반올림, 1000원 이상은 1000원 단위)
    const tick = newPrice >= 100000 ? 1000 : 100;
    stock.price = Math.round(newPrice / tick) * tick;
  });
  state.lastStockUpdate = today;
  saveState();
}

// 오늘(로컬 시간 자정 기준) 해당 보상을 이미 받았는지 체크
function getTodayLocalKey() {
  // 로컬 시간 기준 YYYY-MM-DD (UTC 변환 문제 방지)
  const d = new Date();
  const y = d.getFullYear();
  const m = String(d.getMonth() + 1).padStart(2, '0');
  const day = String(d.getDate()).padStart(2, '0');
  return `${y}-${m}-${day}`;
}

function isRewardClaimedToday(kidId, rewardId) {
  const today = getTodayLocalKey();
  // 부모님 모드일 때도 일단 체크는 하되, 부모가 재지급하고 싶으면 별도 옵션으로
  return state.transactions.some(t => {
    if (t.kidId !== kidId || t.type !== 'reward') return false;
    if (t.rewardId !== rewardId) return false;
    // 로컬 타임존 기준으로 오늘 날짜 매칭
    const d = new Date(t.ts);
    const y = d.getFullYear();
    const m = String(d.getMonth() + 1).padStart(2, '0');
    const day = String(d.getDate()).padStart(2, '0');
    return `${y}-${m}-${day}` === today;
  });
}

function addReward(kidId, rewardId) {
  const r = REWARDS.find(x => x.id === rewardId);
  if (!r) return;
  if (isRewardClaimedToday(kidId, rewardId)) {

    return;

  const tx = { id: uid(), kidId, type: 'reward', amount: r.amount, desc: r.name, rewardId, ts: now() };
  state.transactions.unshift(tx);
  const kid = getKid(kidId);
  if (kid) kid.balance += r.amount;
  // 🎯 목표 달성 체크
  checkGoalAchieved(kidId);
  saveState();
  render();
  toast(`${getKid(kidId).name}이(가) ${fmt(r.amount)}원 받았어요! 🎉`);
}

function undoLastReward(kidId) {
  const last = state.transactions.find(t => t.kidId === kidId && t.type === 'reward');
  if (!last) { toast('취소할 보상이 없어요', 'error'); return; }
  const kid = getKid(kidId);
  if (kid.balance < last.amount) { toast('잔액이 모자라서 취소할 수 없어요', 'error'); return; }
  kid.balance -= last.amount;
  state.transactions = state.transactions.filter(t => t.id !== last.id);
  saveState();
  render();
  toast(`마지막 보상 취소됨`);
}

function buyItem(kidId, categoryKey, itemId, customPrice = null) {
  const cat = SHOP[categoryKey];
  const item = cat.items.find(x => x.id === itemId);
  if (!item) return;
  const kid = getKid(kidId);

  // 자유 금액 상품이면 customPrice 사용
  let finalPrice;
  let finalName;
  if (item.custom) {
    const amount = parseInt(customPrice);
    if (!amount || amount < 100) { toast('100원 이상 입력해주세요', 'error'); return; }
    if (amount > 1000000) { toast('1,000,000원 이하로 입력해주세요', 'error'); return; }
    finalPrice = amount;
    finalName = `${item.name} (${fmt(amount)}원)`;
  } else {
    finalPrice = item.price;
    finalName = item.name;
  }

  if (kid.balance < finalPrice) { toast('잔액이 부족해요', 'error'); return; }

  // 🎰 럭키박스: 즉시 추첨
  if (item.luckyBox) {
    const total = item.prizes.reduce((s, p) => s + p.weight, 0);
    let r = Math.random() * total;
    let prize = item.prizes[0];
    for (const p of item.prizes) {
      r -= p.weight;
      if (r <= 0) { prize = p; break; }
    }
    // 잔액 차감 + 상금 지급
    addTx(kidId, 'purchase', -finalPrice, `${item.name} 구매`);
    addTx(kidId, 'lucky', prize.amount, `🎰 ${item.name} 당첨 ${prize.emoji}`);
    saveState();
    render();
    showLuckyResult(item, prize);
    return;
  }

  // 잔액 차감
  addTx(kidId, 'purchase', -finalPrice, `${finalName} 구매`);
  // 쿠폰 발행

function buyStock(kidId, ticker, shares) {
  shares = parseInt(shares);
  if (!shares || shares < 1) return;
  const stock = state.stocks[ticker];
  const cost = stock.price * shares;
  const kid = getKid(kidId);
  if (kid.balance < cost) { toast('잔액이 부족해요', 'error'); return; }
  addTx(kidId, 'stock_buy', -cost, `${stock.name} ${shares}주 매수 @${fmt(stock.price)}원`);
  setHeld(kidId, ticker, getHeld(kidId, ticker) + shares);
  saveState();
  render();
  toast(`${stock.name} ${shares}주 매수 완료 📈`);
}

function sellStock(kidId, ticker, shares) {
  shares = parseInt(shares);
  if (!shares || shares < 1) return;
  const held = getHeld(kidId, ticker);
  if (held < shares) { toast('보유 주식이 부족해요', 'error'); return; }
  const stock = state.stocks[ticker];
  const proceeds = stock.price * shares;
  addTx(kidId, 'stock_sell', proceeds, `${stock.name} ${shares}주 매도 @${fmt(stock.price)}원`);
  setHeld(kidId, ticker, held - shares);
  saveState();
  render();
  toast(`${stock.name} ${shares}주 매도 완료 💰`);
}

function deposit(kidId, amount, termKey) {
  amount = parseInt(amount);
  if (!amount || amount < 100) { toast('100원 이상 예금해주세요', 'error'); return; }
  const kid = getKid(kidId);
  if (kid.balance < amount) { toast('잔액이 부족해요', 'error'); return; }
  const term = DEPOSIT_TERMS.find(t => t.key === termKey);
  addTx(kidId, 'deposit_in', -amount, `${term.label} 예금 가입 (연 ${(term.rate*100).toFixed(1)}%)`);
  state.deposits.push({
    id: uid(),
    kidId,
    amount,
    startTs: now(),
    termDays: term.days,
    rate: term.rate
  });
  saveState();
  render();
  toast(`${fmt(amount)}원 예금 가입 완료 🏦`);
}

function withdrawDeposit(depositId, force = false) {
  const d = state.deposits.find(x => x.id === depositId);
  if (!d) return;
  const mature = isDepositMature(d);
  if (!mature && !force) {
    confirmModal('중도 해지', '아직 만기 전이에요. 중도 해지하면 이자가 절반만 붙어요. 계속할까요?', () => {
      withdrawDeposit(depositId, true);
    });
    return;
  }
  const currentValue = calcDepositCurrentValue(d);
  const interest = currentValue - d.amount;
  const finalAmount = mature ? currentValue : d.amount + interest * 0.5;
  d.withdrawnAt = now();
  addTx(d.kidId, 'deposit_out', Math.round(finalAmount), mature ? `예금 만기 해지 (+이자 ${fmt(finalAmount - d.amount)}원)` : `예금 중도 해지`);
  saveState();
  render();
  toast(mature ? `만기 해지! ${fmt(finalAmount)}원 입금됨 🎊` : `중도 해지됨`);
}

/* =========================================================
   🔥 연속 달성 (Streak) 보너스
========================================================= */
const STREAK_BONUSES = [
  { days: 3,  bonus: 500,   emoji: '✨' },
  { days: 7,  bonus: 2000,  emoji: '🔥' },
  { days: 14, bonus: 5000,  emoji: '⚡' },
  { days: 30, bonus: 15000, emoji: '🏅' },
  { days: 100,bonus: 50000, emoji: '👑' }
];

function calcStreak(kidId, rewardId) {
  // 같은 보상을 며칠 연속으로 받았는지 (오늘 받았다면 오늘부터, 어제까지)
  const txs = state.transactions
    .filter(t => t.kidId === kidId && t.type === 'reward' && t.rewardId === rewardId)
    .map(t => {
      const d = new Date(t.ts);
      return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
    });
  const dates = [...new Set(txs)].sort().reverse(); // 최신순
  if (dates.length === 0) return 0;
  // 오늘부터 거꾸로 며칠 연속인가
  let streak = 0;
  let cursor = new Date();
  // 오늘 안받았다면 어제부터 카운트
  const todayKey = getTodayLocalKey();
  if (dates[0] !== todayKey) cursor.setDate(cursor.getDate() - 1);
  for (let i = 0; i < dates.length; i++) {
    const ck = `${cursor.getFullYear()}-${String(cursor.getMonth()+1).padStart(2,'0')}-${String(cursor.getDate()).padStart(2,'0')}`;
    if (dates[i] === ck) {
      streak++;
      cursor.setDate(cursor.getDate() - 1);
    } else if (dates[i] < ck) {
      break;
    }
  }
  return streak;
}

function checkAndApplyStreakBonus(kidId, rewardId, rewardName) {
  const streak = calcStreak(kidId, rewardId);
  // 정확히 N일 달성한 시점에만 보너스 (3, 7, 14, 30, 100)
  const milestone = STREAK_BONUSES.find(b => b.days === streak);
  if (milestone) {
    const tx = { id: uid(), kidId, type: 'reward', amount: milestone.bonus, desc: `🔥 ${rewardName} ${streak}일 연속 보너스!`, ts: now() };
    state.transactions.unshift(tx);
    getKid(kidId).balance += milestone.bonus;
    setTimeout(() => toast(`${milestone.emoji} ${streak}일 연속 달성! +${fmt(milestone.bonus)}원 보너스!`, 'success'), 800);
  }
}

/* =========================================================
   🎰 럭키 박스 (랜덤 보상)
========================================================= */
function canClaimLuckyBox(kidId) {
  const today = getTodayLocalKey();
  const box = state.luckyBoxes[kidId];
  if (!box) return true; // 처음 사용
  if (box.lastClaimDate === today) return false; // 오늘 이미 받음
  return today >= box.nextDate;
}

function claimLuckyBox(kidId) {
  if (!canClaimLuckyBox(kidId)) {
    const box = state.luckyBoxes[kidId];
    toast(`다음 럭키박스는 ${box.nextDate}에! 🎁`, 'error');
    return;
  }
  // 가중치 랜덤: 작은 금액이 더 자주, 큰 금액은 가끔
  const rolls = [
    { amount: 100,   weight: 30, emoji: '🪙' },
    { amount: 500,   weight: 25, emoji: '💵' },
    { amount: 1000,  weight: 20, emoji: '💴' },
    { amount: 3000,  weight: 15, emoji: '💸' },
    { amount: 5000,  weight: 7,  emoji: '💰' },
    { amount: 10000, weight: 2,  emoji: '💎' },
    { amount: 50000, weight: 1,  emoji: '🏆' }
  ];
  const total = rolls.reduce((s, r) => s + r.weight, 0);
  let r = Math.random() * total;
  let prize = rolls[0];
  for (const roll of rolls) {
    r -= roll.weight;
    if (r <= 0) { prize = roll; break; }
  }

  // 다음 박스는 3~7일 후 랜덤
  const nextDays = 3 + Math.floor(Math.random() * 5);
  const nextDate = new Date();
  nextDate.setDate(nextDate.getDate() + nextDays);
  const nextKey = `${nextDate.getFullYear()}-${String(nextDate.getMonth()+1).padStart(2,'0')}-${String(nextDate.getDate()).padStart(2,'0')}`;

  state.luckyBoxes[kidId] = {
    lastClaimDate: getTodayLocalKey(),
    nextDate: nextKey
  };

  addTx(kidId, 'lucky', prize.amount, `🎰 럭키박스 ${prize.emoji}`);
  saveState();
  render();
  // 화려한 토스트
  setTimeout(() => toast(`${prize.emoji} 럭키박스! ${fmt(prize.amount)}원 획득! 🎉`, 'success'), 100);
}

  state.autoSavings.push({
    id: uid(),
    kidId,
    amount,
    day: parseInt(dayOfWeek),  // 0=일, 1=월, ..., 6=토
    lastRunDate: null,
    createdAt: now()
  });
  saveState();
  render();
  const dayNames = ['일','월','화','수','목','금','토'];
  toast(`매주 ${dayNames[dayOfWeek]}요일 ${fmt(amount)}원 자동저축 등록!`);

function deleteAutoSaving(savingId) {
  state.autoSavings = state.autoSavings.filter(s => s.id !== savingId);
  saveState();
  render();
  toast('자동저축 해제됨');
}

function runAutoSavingsIfDue() {
  const today = new Date();
  const todayKey = getTodayLocalKey();
  const todayDayOfWeek = today.getDay();
  let ran = false;
  state.autoSavings.forEach(saving => {
    if (saving.day !== todayDayOfWeek) return;
    if (saving.lastRunDate === todayKey) return;
    // 실행
    const kid = getKid(saving.kidId);
    if (!kid) return;
    if (kid.balance >= saving.amount) {
      addTx(saving.kidId, 'auto_save', -saving.amount, `🏦 자동저축 ${fmt(saving.amount)}원`);
      // 6개월 자유 예금으로 저축
      state.deposits.push({
        id: uid(),
        kidId: saving.kidId,
        amount: saving.amount,
        startTs: now(),
        termDays: 0,
        rate: 0.02
      });
      saving.lastRunDate = todayKey;
      ran = true;
    }
  });
  if (ran) saveState();
}

const PENALTIES = [
  { id: 'fight',     name: '형제 싸움',          amount: 1000, emoji: '😠' },
  { id: 'lie',       name: '거짓말',             amount: 2000, emoji: '🤥' },
  { id: 'no_brush',  name: '양치 안 함',         amount: 500,  emoji: '🦷' },
  { id: 'late_sleep',name: '너무 늦게 자기',     amount: 1000, emoji: '🌙' },
  { id: 'no_homework',name: '숙제 안 하기',      amount: 3000, emoji: '📕' },
  { id: 'phone_over',name: '폰·게임 시간 초과',  amount: 2000, emoji: '📱' },
  { id: 'rude',      name: '말 함부로 하기',     amount: 1500, emoji: '😡' },
  { id: 'mess',      name: '방 어지르기',        amount: 1000, emoji: '🗑️' },
  { id: 'whining',   name: '떼쓰기',             amount: 1000, emoji: '😤' },
  { id: 'custom',    name: '직접 입력',          amount: 0,    emoji: '⚠️' }
];

function applyPenalty(kidId, penaltyId, customAmount = null, customReason = null) {
  const kid = getKid(kidId);
  if (!kid) return;
  const penalty = PENALTIES.find(p => p.id === penaltyId);
  if (!penalty) return;

  let amount, reason;
  if (penalty.id === 'custom') {
    amount = parseInt(customAmount);
    reason = customReason?.trim() || '벌금';
    if (!amount || amount < 100) { toast('100원 이상 입력하세요', 'error'); return; }
  } else {
    amount = penalty.amount;
    reason = penalty.name;
  }

  if (kid.balance < amount) {
    toast(`잔액(${fmt(kid.balance)}원)이 벌금보다 적어요. 가능한 만큼만 차감할까요?`, 'error');
    confirmModal('벌금 부족', `잔액 ${fmt(kid.balance)}원 전부를 차감할까요?`, () => {
      addTx(kidId, 'penalty', -kid.balance, `⚠️ ${reason} (잔액 차감)`);
      saveState();
      render();
      toast(`${kid.name} 잔액 ${fmt(kid.balance)}원 차감됨`);
    });
    return;
  }

  addTx(kidId, 'penalty', -amount, `⚠️ ${reason}`);
  saveState();
  render();
  toast(`${kid.name} ${fmt(amount)}원 벌금 차감됨`, 'error');
}

            return `
              <div class="shop-item lucky-item ${can ? 'affordable' : ''}">
                <div class="shop-emoji">${item.emoji}</div>
                <div class="shop-name">${item.name}</div>

                  ${can ? '🎰 뽑기!' : '잔액 부족'}
                </button>

            `;
          }
          return `
            <div class="shop-item ${can ? 'affordable' : ''}">
              <div class="shop-emoji">${item.emoji}</div>
              <div class="shop-name">${item.name}</div>
              <div class="shop-price">${fmt(item.price)}원</div>

        }).join('')}

}

                return `

                      <div class="stock-change ${up ? 'up' : 'down'}">${up ? '▲' : '▼'} ${Math.abs(diff).toLocaleString()}원 (${up ? '+' : ''}${diffPct}%)</div>
                    </div>
                    <div class="stock-held">
                      보유<br><strong>${held}주</strong>
                    </div>
                    <div class="stock-actions">
                      <input type="number" min="1" max="${maxBuy}" value="1" class="form-input" id="buy-${kid.id}-${t}" style="width:60px;padding:6px;">
                      <button class="stock-btn buy" data-action="stock-buy" data-kid="${kid.id}" data-ticker="${t}" ${maxBuy < 1 ? 'disabled' : ''}>매수</button>
                      <input type="number" min="1" max="${held}" value="1" class="form-input" id="sell-${kid.id}-${t}" style="width:60px;padding:6px;">
                      <button class="stock-btn sell" data-action="stock-sell" data-kid="${kid.id}" data-ticker="${t}" ${held < 1 ? 'disabled' : ''}>매도</button>
                    </div>
                  </div>
                `;
              }).join('')}
            </div>
          </div>
        `;
      }).join('')}
    </div>
  `;
}

/* ----- 예금 ----- */
function renderBank() {
  return `
    <div class="card">
      <h2>🏦 예금 · 이자 받기</h2>
      <p style="color:var(--ink-soft);margin-bottom:16px;font-size:14px;">예금하면 시간이 지날수록 이자가 붙어요. 오래 맡길수록 이자율이 높아져요!</p>

      <div class="deposit-options">
        ${DEPOSIT_TERMS.map(t => `
          <div class="deposit-option">
            <div class="period">${t.label}</div>
            <div class="rate">연 ${(t.rate*100).toFixed(1)}%</div>
            <div class="desc">${t.days === 0 ? '언제든 출금 가능' : `${t.days}일 후 만기`}</div>
          </div>
        `).join('')}
      </div>

      ${state.kids.map(kid => {
        const active = calcActiveDeposits(kid.id);
        const depValue = calcDepositValue(kid.id);
        return `
          <div style="margin-top:20px;">
            <h3>${kid.name}의 예금 · 잔액 ${fmt(kid.balance)}원 · 예금액 ${fmt(depValue)}원</h3>

            <div class="deposit-form">
              <input type="number" class="form-input" id="dep-amount-${kid.id}" placeholder="예금할 금액 (원)" min="100">
              <select class="form-select" id="dep-term-${kid.id}">
                ${DEPOSIT_TERMS.map(t => `<option value="${t.key}">${t.label} (연 ${(t.rate*100).toFixed(1)}%)</option>`).join('')}
              </select>
              <button class="admin-btn" style="background:var(--gold);" data-action="deposit" data-kid="${kid.id}">예금하기</button>
            </div>

            ${active.length === 0 ? '<div class="empty">진행중인 예금이 없어요</div>' : `
              <div class="deposit-list">
                ${active.map(d => {
                  const term = DEPOSIT_TERMS.find(t => t.key === (DEPOSIT_TERMS.find(x => x.days === d.termDays && x.rate === d.rate)?.key)) || { label: `${d.termDays}일` };
                  const mature = isDepositMature(d);
                  const cur = calcDepositCurrentValue(d);
                  const interest = cur - d.amount;
                  const start = new Date(d.startTs);
                  const matureDate = new Date(start.getTime() + d.termDays * 24*60*60*1000);
                  const totalMs = d.termDays * 24*60*60*1000;
                  const elapsedMs = Math.max(0, Date.now() - start.getTime());
                  const progress = d.termDays === 0 ? 100 : Math.min(100, (elapsedMs / totalMs) * 100);
                  return `
                    <div class="deposit-item">
                      <div class="deposit-head">
                        <div>
                          <div class="deposit-amount">${fmt(d.amount)}원 · ${term.label} · 연 ${(d.rate*100).toFixed(1)}%</div>
                          <div style="font-size:12px;color:var(--ink-soft);">가입일: ${start.toLocaleDateString('ko-KR')}</div>
                        </div>
                        <div style="text-align:right;">
                          <div style="font-size:13px;color:var(--ink-soft);">현재 평가액</div>
                          <div style="font-weight:700;color:var(--gold);">${fmt(cur)}원</div>
                          <div style="font-size:12px;color:var(--accent);">+${fmt(interest)}원 이자</div>
                        </div>
                      </div>
                      ${d.termDays > 0 ? `
                        <div class="deposit-progress"><div class="deposit-progress-bar" style="width:${progress}%;"></div></div>
                        <div class="deposit-meta">
                          <span>진행 ${progress.toFixed(0)}%</span>
                          <span>만기: ${matureDate.toLocaleDateString('ko-KR')}</span>
                        </div>
                      ` : `<div class="deposit-meta"><span>자유 예금 (언제든 출금)</span></div>`}
                      <button class="withdraw-btn ${mature ? 'ready' : ''}" data-action="withdraw" data-id="${d.id}">
                        ${mature ? '✓ 만기 출금' : '중도 해지'}
                      </button>
                    </div>
                  `;
                }).join('')}
              </div>
            `}

            ${renderAutoSavingsForKid(kid.id)}
          </div>
        `;
      }).join('')}
    </div>
  `;
}

    <div class="card">
      <h2>🎯 목표 저금통</h2>
      <p style="color:var(--ink-soft);font-size:13px;margin-bottom:16px;">갖고 싶은 걸 등록하고, 돈을 모아 달성해봐요! 진행률을 보면서 동기부여 받아요 💪</p>

      ${state.kids.map(kid => {
        const totalAssets = kid.balance + calcStockValue(kid.id) + calcDepositValue(kid.id);
        const myGoals = state.goals.filter(g => g.kidId === kid.id);
        return `
          <div style="margin-bottom:24px;">
            <h3>${kid.name} · 총 자산 ${fmt(totalAssets)}원</h3>

            <div class="goal-form">
              <input type="text" class="form-input" id="goal-name-${kid.id}" placeholder="목표 이름" maxlength="20">
              <input type="number" class="form-input" id="goal-target-${kid.id}" placeholder="목표 금액" min="100">
              <button class="admin-btn" style="background:var(--primary);" data-action="add-goal" data-kid="${kid.id}">+ 추가</button>
            </div>

            ${myGoals.length === 0 ? '<div class="empty">아직 목표가 없어요. 갖고 싶은 걸 등록해봐요!</div>' : `
              <div class="goal-list">
                ${myGoals.map(g => {
                  const progress = Math.min(100, (totalAssets / g.target) * 100);
                  const remaining = Math.max(0, g.target - totalAssets);
                  return `
                    <div class="goal-card ${g.achieved ? 'achieved' : ''}">
                      <div class="goal-head">
                        <div>
                          <div class="goal-name">${g.emoji} ${g.name} ${g.achieved ? '🏆' : ''}</div>
                          <div class="goal-target">목표: ${fmt(g.target)}원</div>
                        </div>
                        <button class="del-mini-btn" data-action="del-goal" data-id="${g.id}">×</button>
                      </div>
                      <div class="goal-bar"><div class="goal-bar-fill" style="width:${progress}%"></div></div>
                      <div class="goal-meta">
                        <span>${progress.toFixed(0)}% 달성</span>
                        ${g.achieved 
                          ? `<span style="color:var(--accent);font-weight:700;">🎉 달성!</span>`
                          : `<span>${fmt(remaining)}원 남음</span>`
                        }
                      </div>
                    </div>
                  `;
                }).join('')}
              </div>
            `}
          </div>
        `;
      }).join('')}

      <div style="margin-top:20px;padding:14px;background:var(--bg-2);border-radius:12px;font-size:13px;color:var(--ink-soft);">
        💡 <strong>팁:</strong> 총 자산 = 현금 + 주식평가액 + 예금. 즉 모든 자산이 목표 달성에 포함돼요!
      </div>
    </div>
  `;
}

/* ----- 📊 통계 페이지 ----- */
function renderStats() {
  // 카테고리별 보상 개수, 이번주/이번달 통계, 연속 기록 등
  const today = new Date();
  const weekStart = new Date(today);
  weekStart.setDate(today.getDate() - today.getDay()); // 일요일
  weekStart.setHours(0,0,0,0);
  const monthStart = new Date(today.getFullYear(), today.getMonth(), 1);

  return `
    <div class="card">
      <h2>📊 통계 대시보드</h2>
      <p style="color:var(--ink-soft);font-size:13px;margin-bottom:16px;">우리 가족의 보상 패턴을 한눈에 봐요!</p>

      ${state.kids.map(kid => {
        const myTxs = state.transactions.filter(t => t.kidId === kid.id);
        const rewards = myTxs.filter(t => t.type === 'reward');
        const thisWeek = rewards.filter(t => new Date(t.ts) >= weekStart);
        const thisMonth = rewards.filter(t => new Date(t.ts) >= monthStart);
        const weekTotal = thisWeek.reduce((s, t) => s + t.amount, 0);
        const monthTotal = thisMonth.reduce((s, t) => s + t.amount, 0);

        // 카테고리별 카운트
        const catCount = {};
        rewards.forEach(t => {
          if (t.rewardId) {
            const r = REWARDS.find(x => x.id === t.rewardId);
            if (r) catCount[r.cat] = (catCount[r.cat] || 0) + 1;
          }
        });
        const sortedCats = Object.entries(catCount).sort((a,b) => b[1]-a[1]);
        const maxCount = sortedCats[0]?.[1] || 1;

        // 가장 많이 받은 보상 TOP 5
        const rewardCount = {};
        rewards.forEach(t => {
          if (t.rewardId) rewardCount[t.rewardId] = (rewardCount[t.rewardId] || 0) + 1;
        });
        const topRewards = Object.entries(rewardCount).sort((a,b) => b[1]-a[1]).slice(0, 5);

        return `
          <div style="margin-bottom:28px;padding:18px;border:var(--border-thin);border-radius:14px;background:var(--bg);">
            <h3>${kid.name} ${kid.gender === 'boy' ? '👦' : '👧'}</h3>

            <div class="stat-grid">
              <div class="stat-box"><div class="stat-label">이번 주 보상 수</div><div class="stat-value">${thisWeek.length}회</div></div>
              <div class="stat-box"><div class="stat-label">이번 주 합계</div><div class="stat-value">${fmt(weekTotal)}원</div></div>
              <div class="stat-box"><div class="stat-label">이번 달 보상 수</div><div class="stat-value">${thisMonth.length}회</div></div>
              <div class="stat-box"><div class="stat-label">이번 달 합계</div><div class="stat-value">${fmt(monthTotal)}원</div></div>
            </div>

            ${sortedCats.length > 0 ? `
              <h4 style="margin:16px 0 10px;font-size:14px;">📁 카테고리별 보상 횟수</h4>
              <div class="cat-bars">
                ${sortedCats.map(([cat, count]) => `
                  <div class="cat-bar-row">
                    <span class="cat-bar-label">${cat}</span>
                    <div class="cat-bar"><div class="cat-bar-fill" style="width:${(count/maxCount)*100}%"></div></div>
                    <span class="cat-bar-count">${count}</span>
                  </div>
                `).join('')}
              </div>
            ` : '<p class="empty">아직 데이터가 없어요</p>'}

            ${topRewards.length > 0 ? `
              <h4 style="margin:16px 0 10px;font-size:14px;">🏆 자주 받은 보상 TOP 5</h4>
              <div class="top-list">
                ${topRewards.map(([rid, count], i) => {
                  const r = REWARDS.find(x => x.id === rid);
                  if (!r) return '';
                  return `
                    <div class="top-item">
                      <span class="top-rank">#${i+1}</span>
                      <span class="top-name">${r.emoji} ${r.name}</span>
                      <span class="top-count">${count}번</span>
                    </div>
                  `;
                }).join('')}
              </div>
            ` : ''}
          </div>
        `;
      }).join('')}
    </div>
  `;
}

/* =========================================================
   이벤트 바인딩
========================================================= */
function attachHandlers() {
  document.querySelectorAll('[data-action]').forEach(el => {
    el.onclick = () => {
      const a = el.dataset.action;
      if (a === 'reward') {
        if (isAdmin) {
          addReward(el.dataset.kid, el.dataset.reward);
        } else {
          passwordModal(() => addReward(el.dataset.kid, el.dataset.reward));
        }
      }
      else if (a === 'undo') {
        if (isAdmin) {
          undoLastReward(el.dataset.kid);
        } else {
          passwordModal(() => undoLastReward(el.dataset.kid));
        }
      }
      else if (a === 'reward-cat'){ rewardCat[el.dataset.kid] = el.dataset.cat; render(); }
      else if (a === 'select-kid'){ selectedChild = el.dataset.kid; render(); }
      else if (a === 'clear-selected'){ selectedChild = null; render(); }
      else if (a === 'cat')       { shopCategory = el.dataset.cat; render(); }
      else if (a === 'buy')       buyItem(selectedChild, el.dataset.cat, el.dataset.item);
      else if (a === 'buy-custom'){
        const price = document.getElementById(`custom-${el.dataset.item}`).value;
        buyItem(selectedChild, el.dataset.cat, el.dataset.item, price);
      }
      else if (a === 'use-coupon')useCoupon(el.dataset.id);
      else if (a === 'del-coupon')deleteCoupon(el.dataset.id);
      else if (a === 'stock-buy') {
        const q = document.getElementById(`buy-${el.dataset.kid}-${el.dataset.ticker}`).value;
        buyStock(el.dataset.kid, el.dataset.ticker, q);
      }
      else if (a === 'stock-sell') {
        const q = document.getElementById(`sell-${el.dataset.kid}-${el.dataset.ticker}`).value;
        sellStock(el.dataset.kid, el.dataset.ticker, q);
      }
      else if (a === 'deposit') {
        const amount = document.getElementById(`dep-amount-${el.dataset.kid}`).value;
        const term = document.getElementById(`dep-term-${el.dataset.kid}`).value;
        deposit(el.dataset.kid, amount, term);
      }
      else if (a === 'withdraw') withdrawDeposit(el.dataset.id);
      else if (a === 'edit-balance') editBalance(el.dataset.kid);
      else if (a === 'lucky') {
        if (isAdmin) claimLuckyBox(el.dataset.kid);
        else passwordModal(() => claimLuckyBox(el.dataset.kid));
      }
      else if (a === 'add-goal') {
        const kidId = el.dataset.kid;
        const name = document.getElementById(`goal-name-${kidId}`).value;
        const target = document.getElementById(`goal-target-${kidId}`).value;
        addGoal(kidId, name, target);
      }
      else if (a === 'del-goal') deleteGoal(el.dataset.id);
      else if (a === 'transfer') {
        const from = document.getElementById('transfer-from').value;
        const to   = document.getElementById('transfer-to').value;
        const amt  = document.getElementById('transfer-amount').value;
        if (from === to) { toast('같은 사람에게는 보낼 수 없어요', 'error'); return; }
        transferToSibling(from, to, amt);
      }
      else if (a === 'send-msg') {
        if (!isAdmin) { toast('부모님 모드에서만 발송 가능', 'error'); return; }
        const kidId = document.getElementById('msg-kid').value;
        const text = document.getElementById('msg-text').value;
        const amount = document.getElementById('msg-amount').value;
        sendParentMessage(kidId, text, amount);
      }
      else if (a === 'add-autosave') {
        const kidId = el.dataset.kid;
        const amount = document.getElementById(`autosave-amount-${kidId}`).value;
        const day = document.getElementById(`autosave-day-${kidId}`).value;
        addAutoSaving(kidId, amount, day);
      }
      else if (a === 'del-autosave') deleteAutoSaving(el.dataset.id);
      else if (a === 'penalty') {
        if (!isAdmin) { passwordModal(() => applyPenalty(el.dataset.kid, el.dataset.penalty)); }
        else applyPenalty(el.dataset.kid, el.dataset.penalty);
      }
      else if (a === 'penalty-custom') {
        const kidId = el.dataset.kid;
        const reason = document.getElementById(`penalty-reason-${kidId}`).value;
        const amount = document.getElementById(`penalty-amount-${kidId}`).value;
        if (!isAdmin) { passwordModal(() => applyPenalty(kidId, 'custom', amount, reason)); }
        else applyPenalty(kidId, 'custom', amount, reason);
      }
    };
  });
}

function editBalance(kidId) {
  const kid = getKid(kidId);
  const modal = document.createElement('div');
  modal.className = 'modal';
  modal.innerHTML = `
    <div class="modal-content">
      <h3>✏️ ${kid.name} 잔액 수정</h3>
      <p>현재 잔액: ${fmt(kid.balance)}원</p>
      <input type="number" class="modal-input" id="new-balance" value="${kid.balance}">
      <div class="modal-buttons">
        <button class="cancel">취소</button>
        <button class="confirm">저장</button>
      </div>
    </div>
  `;
  document.body.appendChild(modal);
  modal.querySelector('.cancel').onclick = () => modal.remove();
  modal.querySelector('.confirm').onclick = () => {
    const v = parseInt(modal.querySelector('#new-balance').value);
    if (isNaN(v)) { toast('숫자를 입력하세요', 'error'); return; }
    const diff = v - kid.balance;
    kid.balance = v;
    state.transactions.unshift({ id: uid(), kidId, type: 'adjust', amount: diff, desc: '관리자 조정', ts: now() });
    saveState();
    modal.remove();
    render();
    toast('잔액이 수정됐어요');
  };
}

      render();
    });
  }
};

// Firebase가 준비되면 연결, 이미 준비되었으면 바로 호출
if (window.__firebase) {
  initFirebase();
} else {
  window.addEventListener('firebase-ready', initFirebase, { once: true });
  // Firebase가 10초 내로 로드 안 되면 로컬 모드로 폴백
  setTimeout(() => {
    if (!initialLoadDone) {
      console.warn('Firebase 로드 타임아웃 - 로컬 모드');
      initFirebase();
    }
  }, 10000);
}
